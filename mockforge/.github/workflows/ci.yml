name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run test:health
      - run: npm run test:queue
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- tests/smoke.spec.ts
      - run: npm run build

  staging-note:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: lint-build-test
    steps:
      - run: echo "Main passed CI. Connect this repo to Vercel Preview/Production or a staging deploy hook for automatic staging deploys on merge." 
